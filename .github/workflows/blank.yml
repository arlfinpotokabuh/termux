name: Build Android APK From Agent ZIP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.38.1'

    - name: Create Webview Wrapper App
      run: |
        flutter create my_agent_app --org com.googleai.agent
        cd my_agent_app
        
        cat << 'EOF' > pubspec.yaml
        name: my_agent_app
        description: "A new Flutter project."
        publish_to: 'none'
        version: 1.0.0+1

        environment:
          sdk: '>=3.38.0 <4.0.0'

        dependencies:
          flutter:
            sdk: flutter
          webview_flutter: ^4.4.2

        flutter:
          uses-material-design: true
        EOF
        
        flutter pub get

    - name: Build APK
      run: |
        cd my_agent_app
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Agent-AI-Application
        path: my_agent_app/build/app/outputs/flutter-apk/app-release.apk
