name: Build Android APK From Agent ZIP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Create Webview Wrapper App
      run: |
        flutter create my_agent_app --org com.googleai.agent
        cd my_agent_app
        # Mengonfigurasi aplikasi agar langsung membuka antarmuka chat agen Anda
        # (Catatan: Ini membuat wrapper dasar berbasis web view)
        echo "dependencies: flutter: sdk: flutter\n  webview_flutter: ^4.4.2" > pubspec.yaml
        flutter pub get

    - name: Build APK
      run: |
        cd my_agent_app
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Agent-AI-Application
        path: my_agent_app/build/app/outputs/flutter-apk/app-release.apk


      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
